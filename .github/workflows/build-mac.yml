name: Build Standalone macOS Binary

on:
  workflow_dispatch:
  push:
    paths:
      - "encode_mivf.py"
      - "tools/miv2y_moflex_tier.c"
      - "tools/m2y2_transcode.c"
      - ".github/workflows/build-encoder-macos.yml"

jobs:
  build-macos:
    runs-on: macos-15-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install FFmpeg and Python build tools
        run: |
          brew update
          brew install ffmpeg

          python -m pip install --upgrade pip
          python -m pip install pyinstaller

          echo "FFmpeg path:"
          which ffmpeg
          ffmpeg -version | head -n 3

      - name: Build native encoder helpers
        run: |
          # IMPORTANT:
          # encode_mivf.py currently looks for "miv2y_moflex_tier.exe",
          # so keep this filename even on macOS.
          gcc tools/miv2y_moflex_tier.c -O3 -o tools/miv2y_moflex_tier.exe -lm

          # encode_mivf.py looks for "tools/m2y2_transcode" on non-Windows layouts.
          gcc tools/m2y2_transcode.c -O3 -o tools/m2y2_transcode

          chmod +x tools/miv2y_moflex_tier.exe
          chmod +x tools/m2y2_transcode

          echo "Native helper sizes:"
          ls -lh tools/miv2y_moflex_tier.exe
          ls -lh tools/m2y2_transcode

      - name: Build standalone macOS encoder
        run: |
          FFMPEG_PATH="$(realpath "$(which ffmpeg)")"

          echo "Bundling FFmpeg from:"
          echo "$FFMPEG_PATH"
          ls -lh "$FFMPEG_PATH"

          pyinstaller --clean --onefile \
            --add-binary "tools/miv2y_moflex_tier.exe:." \
            --add-binary "tools/m2y2_transcode:tools" \
            --add-binary "$FFMPEG_PATH:." \
            encode_mivf.py

          echo "Final raw binary size:"
          ls -lh dist/encode_mivf
          du -h dist/encode_mivf

      - name: Smoke test binary
        run: |
          chmod +x dist/encode_mivf
          ./dist/encode_mivf --help

      - name: Upload macOS encoder artifact
        uses: actions/upload-artifact@v4
        with:
          name: MIVF-Encoder-Mac
          path: dist/encode_mivf
          if-no-files-found: error
