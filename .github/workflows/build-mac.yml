name: Build Standalone macOS Binary

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Compile Native C Backends
      run: |
        gcc tools/miv2y_moflex_tier.c -O3 -o tools/miv2y_moflex_tier.exe -lm
        gcc tools/m2y2_transcode.c -O3 -o tools/m2y2_transcode

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Bundle into Single Mac Executable
      run: |
        pyinstaller --onefile --add-data "tools/miv2y_moflex_tier.exe:." --add-data "tools/m2y2_transcode:tools" encode_mivf.py

    - name: Upload Finished Mac Binary as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MIVF-Encoder-Mac
        path: dist/encode_mivf
