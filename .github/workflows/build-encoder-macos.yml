name: Build macOS Encoder

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          brew install ffmpeg
          pip install --upgrade pip
          pip install pyinstaller

      - name: Compile Native C Backends
        run: |
          gcc tools/miv2y_moflex_tier.c -O3 -o tools/miv2y_moflex_tier -lm
          gcc tools/m2y2_transcode.c -O3 -o tools/m2y2_transcode -lm

      - name: Get FFmpeg path
        id: ffmpeg_path
        run: |
          FFMPEG_PATH=$(brew --prefix ffmpeg)/bin/ffmpeg
          echo "ffmpeg_path=$FFMPEG_PATH" >> $GITHUB_OUTPUT
          echo "FFmpeg path: $FFMPEG_PATH"
          file "$FFMPEG_PATH"
          ls -lh "$FFMPEG_PATH"

      - name: Build macOS encoder
        run: |
          pyinstaller --clean --onefile \
            --add-binary "${{ steps.ffmpeg_path.outputs.ffmpeg_path }}:." \
            --add-binary "tools/miv2y_moflex_tier:." \
            --add-binary "tools/m2y2_transcode:tools" \
            --name "encode_mivf_macos" \
            encode_mivf.py

      - name: Verify binary contents
        run: |
          file dist/encode_mivf_macos
          ls -lh dist/encode_mivf_macos
          chmod +x dist/encode_mivf_macos
          # Check if ffmpeg is bundled by testing the help output
          dist/encode_mivf_macos --help || true

      - name: Generate checksums
        run: |
          shasum -a 256 dist/encode_mivf_macos > dist/encode_mivf_macos.sha256
          cat dist/encode_mivf_macos.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: encode_mivf_macos
          path: dist/

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/encode_mivf_macos
            dist/encode_mivf_macos.sha256
          tag_name: ${{ github.ref_name || 'latest-macos' }}
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
