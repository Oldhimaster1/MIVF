name: Build macOS Encoder

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          brew install ffmpeg
          pip install --upgrade pip
          pip install pyinstaller

      - name: Get FFmpeg path
        id: ffmpeg_path
        run: |
          FFMPEG_PATH=$(brew --prefix ffmpeg)/bin/ffmpeg
          echo "ffmpeg_path=$FFMPEG_PATH" >> $GITHUB_OUTPUT
          echo "Using FFmpeg: $FFMPEG_PATH"

      - name: Build macOS encoder
        run: |
          # Build with PyInstaller (will create universal binary on macOS automatically)
          pyinstaller --clean --onefile \
            --add-binary "${{ steps.ffmpeg_path.outputs.ffmpeg_path }}:." \
            --name "encode_mivf_macos" \
            encode_mivf.py

      - name: Verify binary
        run: |
          file dist/encode_mivf_macos
          chmod +x dist/encode_mivf_macos
          dist/encode_mivf_macos --help

      - name: Generate checksums
        run: |
          shasum -a 256 dist/encode_mivf_macos > dist/encode_mivf_macos.sha256
          cat dist/encode_mivf_macos.sha256

      - name: Create release notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          # macOS Encoder Release

          **Files:**
          - `encode_mivf_macos` – Universal binary (Intel x86_64 + Apple Silicon arm64)
          - `encode_mivf_macos.sha256` – SHA256 checksum

          **Usage:**
          ```bash
          chmod +x encode_mivf_macos
          ./encode_mivf_macos input.mp4 output.mivf --m2y2 --no-deploy
          ```

          **Requirements:**
          - macOS 11 or later
          - FFmpeg is bundled in this binary

          **Verify binary integrity:**
          ```bash
          shasum -a 256 -c encode_mivf_macos.sha256
          ```

          **Build info:**
          - Built with Python 3.11 and PyInstaller on macOS
          - Includes bundled FFmpeg
          EOF

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/encode_mivf_macos
            dist/encode_mivf_macos.sha256
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (v4)
        uses: actions/upload-artifact@v4
        with:
          name: encode_mivf_macos
          path: |
            dist/encode_mivf_macos
            dist/encode_mivf_macos.sha256
