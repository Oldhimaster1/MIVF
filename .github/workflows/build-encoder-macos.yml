name: Build macOS Encoder

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          brew install ffmpeg
          pip install --upgrade pip
          pip install pyinstaller

      - name: Get FFmpeg path
        id: ffmpeg_path
        run: |
          FFMPEG_PATH=$(brew --prefix ffmpeg)/bin/ffmpeg
          echo "ffmpeg_path=$FFMPEG_PATH" >> $GITHUB_OUTPUT

      - name: Build for ${{ matrix.arch }}
        run: |
          # Set architecture-specific flags
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            export ARCHFLAGS="-arch arm64"
            ARCH_SUFFIX="arm64"
          else
            export ARCHFLAGS="-arch x86_64"
            ARCH_SUFFIX="x86_64"
          fi

          # Build with PyInstaller
          pyinstaller --clean --onefile \
            --add-binary "${{ steps.ffmpeg_path.outputs.ffmpeg_path }}:." \
            --add-binary "tools/m2y2_transcode.exe:tools" \
            --add-binary "miv2y_moflex_tier.exe:." \
            --name "encode_mivf_${ARCH_SUFFIX}" \
            --target-arch "${{ matrix.arch }}" \
            encode_mivf.py

      - name: Build universal binary (Intel + ARM64)
        if: matrix.arch == 'arm64'
        run: |
          # This runs only once after both architectures are built
          # We'll create the universal binary in post-processing
          echo "Universal binary will be created in release step"

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: encode_mivf_macos_${{ matrix.arch }}
          path: dist/encode_mivf_${{ matrix.arch }}

  create-universal-binary:
    runs-on: macos-latest
    needs: build-macos
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: encode_mivf_macos_x86_64

      - uses: actions/download-artifact@v3
        with:
          name: encode_mivf_macos_arm64

      - name: Create universal binary
        run: |
          lipo -create encode_mivf_x86_64 encode_mivf_arm64 -output encode_mivf_macos

      - name: Generate checksums
        run: |
          shasum -a 256 encode_mivf_macos > encode_mivf_macos.sha256
          cat encode_mivf_macos.sha256

      - name: Upload universal binary artifact
        uses: actions/upload-artifact@v3
        with:
          name: encode_mivf_macos_universal
          path: encode_mivf_macos

      - name: Upload checksums
        uses: actions/upload-artifact@v3
        with:
          name: encode_mivf_macos_checksums
          path: encode_mivf_macos.sha256

  release:
    runs-on: ubuntu-latest
    needs: create-universal-binary
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: encode_mivf_macos_universal

      - uses: actions/download-artifact@v3
        with:
          name: encode_mivf_macos_checksums

      - name: Make binary executable
        run: chmod +x encode_mivf_macos

      - name: Create release notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          # macOS Encoder Release

          **Files:**
          - `encode_mivf_macos` – Universal binary (Intel x86_64 + Apple Silicon arm64)
          - `encode_mivf_macos.sha256` – SHA256 checksum

          **Usage:**
          ```bash
          chmod +x encode_mivf_macos
          ./encode_mivf_macos input.mp4 output.mivf --m2y2 --no-deploy
          ```

          **Requirements:**
          - macOS 11 or later
          - FFmpeg is bundled in this binary

          **Build info:**
          - Built with Python 3.11 and PyInstaller
          - Includes bundled FFmpeg and native encoder tools
          EOF

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            encode_mivf_macos
            encode_mivf_macos.sha256
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
